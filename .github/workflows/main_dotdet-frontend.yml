name: Build and deploy DotDet frontend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_DOTDET_API_URL: https://dotdet-ctbsh6dzfnb0athn.eastus-01.azurewebsites.net
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotdet-frontend
          path: frontend/dist

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: dotdet-frontend
          path: dotdet-frontend

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: dotdet-frontend-d5a4dhd3audvfsd5
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5CAEB75B288747268BFDF8FE2A46074D }}
          package: dotdet-frontend
